<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <title>How the auto-updating fork works</title>
  <desc>Every few hours the fork takes the latest official Tailscale, applies the patches listed in fork-patches.txt onto a fresh copy, builds and signs an APK, and publishes a GitHub release installed via Obtainium. If a patch clashes with an upstream change, Claude redoes it automatically.</desc>
  <rect x="1" y="1" width="718" height="458" rx="12" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6" fill="none" stroke="#656d76" stroke-width="1.5"/>
    </marker>
    <marker id="arb" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6" fill="none" stroke="#0969da" stroke-width="1.5"/>
    </marker>
  </defs>

  <text x="28" y="34" font-size="17" font-weight="700" fill="#1f2328">How this fork stays current — automatically</text>

  <rect x="210" y="52" width="270" height="50" rx="9" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="345" y="73" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2328">&#9312; Latest official Tailscale</text>
  <text x="345" y="90" text-anchor="middle" font-size="11.5" fill="#656d76">tailscale-android &#183; upstream main</text>

  <line x1="345" y1="102" x2="345" y2="146" stroke="#656d76" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="356" y="128" font-size="11.5" font-style="italic" fill="#656d76">every few hours</text>

  <rect x="210" y="148" width="270" height="54" rx="9" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="345" y="170" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2328">&#9313; Apply the fork's patches</text>
  <text x="345" y="188" text-anchor="middle" font-size="11.5" fill="#656d76">onto a fresh copy &#8212; not kept on main</text>

  <line x1="345" y1="202" x2="345" y2="246" stroke="#656d76" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="210" y="248" width="270" height="50" rx="9" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="345" y="269" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2328">&#9314; Build + sign with the fork key</text>
  <text x="345" y="286" text-anchor="middle" font-size="11.5" fill="#656d76">&#8594; GitHub Release (signed APK)</text>

  <line x1="345" y1="298" x2="345" y2="342" stroke="#656d76" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="210" y="344" width="270" height="50" rx="9" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="345" y="365" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2328">&#9315; Install &amp; auto-update</text>
  <text x="345" y="382" text-anchor="middle" font-size="11.5" fill="#656d76">on your phone, via Obtainium</text>

  <rect x="22" y="150" width="152" height="50" rx="9" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="98" y="171" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">Your patches</text>
  <text x="98" y="189" text-anchor="middle" font-size="10.5" fill="#656d76">branches you add</text>
  <line x1="174" y1="175" x2="208" y2="175" stroke="#656d76" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="98" y="219" text-anchor="middle" font-size="10.5" fill="#656d76">listed in fork-patches.txt</text>

  <rect x="500" y="140" width="200" height="92" rx="9" fill="#ddf4ff" stroke="#0969da" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="600" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#0969da">If a patch clashes</text>
  <text x="600" y="181" text-anchor="middle" font-size="11" fill="#1f2328">Claude redoes it on the</text>
  <text x="600" y="196" text-anchor="middle" font-size="11" fill="#1f2328">new upstream, build-checks,</text>
  <text x="600" y="211" text-anchor="middle" font-size="11" fill="#1f2328">updates the branch &#8212; auto</text>

  <line x1="480" y1="168" x2="498" y2="168" stroke="#0969da" stroke-width="1.5" marker-end="url(#arb)"/>
  <text x="489" y="160" text-anchor="middle" font-size="10" fill="#0969da">clash</text>
  <path d="M600,232 L600,252 L98,252 L98,202" fill="none" stroke="#0969da" stroke-width="1.5" marker-end="url(#arb)"/>
  <text x="345" y="248" text-anchor="middle" font-size="10.5" fill="#0969da">fixed patch &#8594; picked up on the next build</text>
</svg>
